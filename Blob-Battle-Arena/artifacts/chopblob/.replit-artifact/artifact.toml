kind = "web"
previewPath = "/"
title = "ChopBlob.io"
version = "1.0.0"
id = "artifacts/chopblob"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20150

[services.development]
run = "pnpm --filter @workspace/chopblob run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/chopblob", "run", "build" ]
serve = "static"
publicDir = "artifacts/chopblob/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20150"
BASE_PATH = "/"
